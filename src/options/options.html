<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LinguaPop 设置</title>
    <link rel="stylesheet" href="./options.css">
  </head>
  <body>
    <main class="page">
      <section class="panel">
        <p class="eyebrow">LinguaPop</p>
        <h1>划词翻译设置</h1>
        <p class="intro">支持腾讯云机器翻译和百度翻译。先选择服务商，再填写对应凭证，即可在网页里划词翻译或用右键菜单触发翻译。</p>

        <form id="settings-form" class="form">
          <label class="field">
            <span>翻译服务</span>
            <select id="provider" name="provider">
              <option value="tencent">腾讯云机器翻译</option>
              <option value="baidu">百度翻译</option>
            </select>
          </label>

          <section id="tencent-fields" class="provider-fields">
            <label class="field">
              <span>腾讯云 SecretId</span>
              <input id="tencent-secret-id" name="tencentSecretId" type="text" autocomplete="off" placeholder="请输入 SecretId">
            </label>

            <label class="field">
              <span>腾讯云 SecretKey</span>
              <input id="tencent-secret-key" name="tencentSecretKey" type="password" autocomplete="off" placeholder="请输入 SecretKey">
            </label>

            <div class="field-grid">
              <label class="field">
                <span>Region</span>
                <input id="tencent-region" name="tencentRegion" type="text" autocomplete="off" placeholder="ap-guangzhou">
              </label>
              <label class="field">
                <span>ProjectId</span>
                <input id="tencent-project-id" name="tencentProjectId" type="text" inputmode="numeric" autocomplete="off" placeholder="0">
              </label>
            </div>
          </section>

          <section id="baidu-fields" class="provider-fields">
            <label class="field">
              <span>百度翻译 App ID</span>
              <input id="baidu-app-id" name="baiduAppId" type="text" autocomplete="off" placeholder="请输入 App ID">
            </label>

            <label class="field">
              <span>百度翻译 Secret Key</span>
              <input id="baidu-secret-key" name="baiduSecretKey" type="password" autocomplete="off" placeholder="请输入 Secret Key">
            </label>
          </section>

          <fieldset class="field">
            <legend>触发方式</legend>
            <label class="radio">
              <input type="radio" name="triggerMode" value="auto">
              <span>默认自动弹出翻译卡片</span>
            </label>
            <label class="radio">
              <input type="radio" name="triggerMode" value="button">
              <span>先显示小按钮，再点击翻译</span>
            </label>
          </fieldset>

          <button class="submit" type="submit">保存设置</button>
          <p id="status" class="status" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="../shared/constants.js"></script>
    <script src="../shared/storage.js"></script>
    <script src="./options.js"></script>
  </body>
</html>
